<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Music Delight Calendar</title><style>
:root{--bg:#0b1020;--panel:#121a2f;--panel2:#17213b;--text:#eef3ff;--muted:#9ca9c8;--line:#263456;--accent:#7c9cff;--danger:#ff6b6b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#09101f,#0d1427);color:var(--text)}button,input,select{font:inherit}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);padding:20px;background:#0a1020}.brand{font-weight:800;font-size:20px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:24px}.teacherBtn{display:flex;gap:9px;align-items:center;width:100%;border:0;background:transparent;color:var(--muted);padding:9px;border-radius:9px;text-align:left;cursor:pointer}.teacherBtn:hover{background:var(--panel);color:var(--text)}.dot{width:10px;height:10px;border-radius:50%}.main{padding:22px}.top{display:flex;justify-content:space-between;gap:15px;align-items:center;flex-wrap:wrap}.top h1{margin:0}.actions{display:flex;gap:8px;flex-wrap:wrap}button{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}button.primary{background:var(--accent);color:#081022;border-color:transparent;font-weight:700}.filters{display:grid;grid-template-columns:2fr repeat(3,1fr);gap:10px;background:var(--panel);padding:12px;border:1px solid var(--line);border-radius:14px;margin:16px 0}.filters input,.filters select,dialog input,dialog select{width:100%;background:#0d152a;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}.stat b{display:block;font-size:24px}.stat span{color:var(--muted);font-size:13px}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dayname{text-align:center;color:var(--muted);padding:6px}.day{min-height:145px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px}.day.other{opacity:.38}.event{font-size:12px;padding:7px;border-radius:8px;margin:5px 0;background:#1b294a;border-left:4px solid var(--accent);cursor:pointer}.event .time{font-weight:800}.event .small{color:var(--muted);margin-top:2px}.list{display:none}.group{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.row{display:grid;grid-template-columns:110px 1.3fr 1fr 1fr 90px;gap:8px;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}.badge{font-size:12px;padding:3px 7px;border-radius:999px;background:#213253}dialog{border:1px solid var(--line);border-radius:16px;background:var(--panel);color:var(--text);width:min(560px,94vw)}dialog::backdrop{background:#0009}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid label{font-size:13px;color:var(--muted)}.wide{grid-column:1/-1}.modalActions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}.danger{background:#4b2027}.hidden{display:none!important}@media(max-width:900px){.app{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--line)}.filters{grid-template-columns:1fr 1fr}.cal{grid-template-columns:repeat(2,1fr)}.dayname{display:none}}@media(max-width:560px){.filters,.stats{grid-template-columns:1fr}.cal{grid-template-columns:1fr}.row{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.wide{grid-column:auto}}
</style></head><body><div class="app"><aside class="side"><div class="brand">Music Delight</div><div class="sub">Teacher Calendar</div><div id="teacherQuick"></div></aside><main class="main"><div class="top"><div><h1>Calendar</h1><div class="sub">No schools or lessons have been inserted.</div></div><div class="actions"><button id="exportBtn">Export JSON</button><button id="clearBtn">Clear Lessons</button><button class="primary" id="addBtn">+ Add Lesson</button></div></div><section class="filters"><input id="search" placeholder="Search school, class, activity or notes"><select id="teacherFilter"><option value="">All teachers</option></select><select id="activityFilter"><option value="">All activities</option></select><select id="statusFilter"><option value="">All statuses</option><option>Confirmed</option><option>TBC</option><option>NA</option><option>Public Holiday</option></select></section><section class="stats"><div class="stat"><b id="total">0</b><span>Visible lessons</span></div><div class="stat"><b>7</b><span>Teachers</span></div><div class="stat"><b id="tbc">0</b><span>TBC</span></div><div class="stat"><b id="na">0</b><span>NA</span></div></section><div class="toolbar"><div class="actions"><button id="prev">←</button><button id="today">Today</button><button id="next">→</button><strong id="month"></strong></div><div class="actions"><button id="monthBtn" class="primary">Month</button><button id="listBtn">List</button></div></div><div id="monthWrap"><div class="cal" id="daynames"></div><div class="cal" id="calendar"></div></div><div id="list" class="list"></div></main></div><dialog id="dlg"><form id="form"><h2 id="dlgTitle">Add Lesson</h2><input type="hidden" id="id"><div class="grid"><label>Teacher<select id="fTeacher" required></select></label><label>Date<input id="fDate" type="date" required></label><label>Start<input id="fStart" type="time" required></label><label>End<input id="fEnd" type="time" required></label><label class="wide">School<input id="fSchool" placeholder="Enter school name" required></label><label>Class / Group<input id="fClass" placeholder="e.g. 4IN or CCA"></label><label>Activity<input id="fActivity" placeholder="e.g. Keyboard" required></label><label>Status<select id="fStatus"><option>Confirmed</option><option>TBC</option><option>NA</option><option>Public Holiday</option></select></label><label class="wide">Notes<input id="fNotes" placeholder="Optional"></label></div><div class="modalActions"><button type="button" id="deleteBtn" class="danger hidden">Delete</button><button type="button" id="cancel">Cancel</button><button class="primary">Save</button></div></form></dialog><script>
const TEACHERS=["Gerald", "Joel", "Claris", "Wero", "Audrey", "Ashley", "Siew Lynn"];const COLORS=['#7c9cff','#51d88a','#ff9f6e','#c084fc','#65d9ff','#ffc857','#ff7aa2'];const KEY='musicDelightCalendarV2';let events=JSON.parse(localStorage.getItem(KEY)||'[]');let current=new Date();const $=x=>document.getElementById(x);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function save(){localStorage.setItem(KEY,JSON.stringify(events))}function setup(){const opts=TEACHERS.map(t=>`<option>${esc(t)}</option>`).join('');$('teacherFilter').innerHTML='<option value="">All teachers</option>'+opts;$('fTeacher').innerHTML=opts;$('teacherQuick').innerHTML=TEACHERS.map((t,i)=>`<button class="teacherBtn" data-t="${esc(t)}"><span class="dot" style="background:${COLORS[i]}"></span>${esc(t)}</button>`).join('');document.querySelectorAll('.teacherBtn').forEach(b=>b.onclick=()=>{$('teacherFilter').value=b.dataset.t;render()})}function filtered(){const q=$('search').value.toLowerCase(),t=$('teacherFilter').value,a=$('activityFilter').value,s=$('statusFilter').value;return events.filter(e=>(!q||[e.school,e.className,e.activity,e.teacher,e.notes].join(' ').toLowerCase().includes(q))&&(!t||e.teacher===t)&&(!a||e.activity===a)&&(!s||e.status===s))}function refreshActivities(){const old=$('activityFilter').value;const vals=[...new Set(events.map(e=>e.activity).filter(Boolean))].sort();$('activityFilter').innerHTML='<option value="">All activities</option>'+vals.map(v=>`<option>${esc(v)}</option>`).join('');$('activityFilter').value=vals.includes(old)?old:''}function render(){const data=filtered();$('total').textContent=data.length;$('tbc').textContent=data.filter(e=>e.status==='TBC').length;$('na').textContent=data.filter(e=>e.status==='NA').length;$('month').textContent=current.toLocaleString('en-SG',{month:'long',year:'numeric'});$('daynames').innerHTML=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="dayname">${d}</div>`).join('');const y=current.getFullYear(),m=current.getMonth(),first=new Date(y,m,1),off=(first.getDay()+6)%7,start=new Date(y,m,1-off);let h='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=localISO(d),items=data.filter(e=>e.date===iso).sort((a,b)=>a.start.localeCompare(b.start));h+=`<div class="day ${d.getMonth()!==m?'other':''}"><b>${d.getDate()}</b>${items.map(ev=>{const color=COLORS[TEACHERS.indexOf(ev.teacher)]||'#7c9cff';return `<div class="event" data-id="${ev.id}" style="border-left-color:${color}"><div class="time">${esc(ev.start)}–${esc(ev.end)}</div><div>${esc(ev.school)}${ev.className?' · '+esc(ev.className):''}</div><div class="small">${esc(ev.activity)} · ${esc(ev.teacher)}${ev.status!=='Confirmed'?' · '+esc(ev.status):''}</div></div>`}).join('')}</div>`}$('calendar').innerHTML=h;document.querySelectorAll('.event').forEach(x=>x.onclick=()=>edit(x.dataset.id));const groups={};data.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start)).forEach(e=>(groups[e.date]??=[]).push(e));$('list').innerHTML=Object.entries(groups).map(([d,items])=>`<div class="group"><h3>${new Date(d+'T00:00:00').toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h3>${items.map(e=>`<div class="row" data-id="${e.id}"><b>${esc(e.start)}–${esc(e.end)}</b><span>${esc(e.school)}${e.className?' · '+esc(e.className):''}</span><span>${esc(e.activity)}</span><span>${esc(e.teacher)}</span><span class="badge">${esc(e.status)}</span></div>`).join('')}</div>`).join('')||'<div class="group">No lessons added yet.</div>';document.querySelectorAll('.row').forEach(x=>x.onclick=()=>edit(x.dataset.id))}function localISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function add(){ $('form').reset();$('id').value='';$('dlgTitle').textContent='Add Lesson';$('fDate').value=localISO(new Date());$('deleteBtn').classList.add('hidden');$('dlg').showModal()}function edit(id){const e=events.find(x=>x.id===id);if(!e)return;$('dlgTitle').textContent='Edit Lesson';$('id').value=e.id;$('fTeacher').value=e.teacher;$('fDate').value=e.date;$('fStart').value=e.start;$('fEnd').value=e.end;$('fSchool').value=e.school;$('fClass').value=e.className||'';$('fActivity').value=e.activity;$('fStatus').value=e.status;$('fNotes').value=e.notes||'';$('deleteBtn').classList.remove('hidden');$('dlg').showModal()}$('form').onsubmit=e=>{e.preventDefault();const id=$('id').value||'e-'+Date.now();const obj={id,teacher:$('fTeacher').value,date:$('fDate').value,start:$('fStart').value,end:$('fEnd').value,school:$('fSchool').value.trim(),className:$('fClass').value.trim(),activity:$('fActivity').value.trim(),status:$('fStatus').value,notes:$('fNotes').value.trim()};const i=events.findIndex(x=>x.id===id);if(i>=0)events[i]=obj;else events.push(obj);save();refreshActivities();render();$('dlg').close()};$('deleteBtn').onclick=()=>{const id=$('id').value;if(id&&confirm('Delete this lesson?')){events=events.filter(e=>e.id!==id);save();refreshActivities();render();$('dlg').close()}};$('addBtn').onclick=add;$('cancel').onclick=()=>$('dlg').close();$('prev').onclick=()=>{current=new Date(current.getFullYear(),current.getMonth()-1,1);render()};$('next').onclick=()=>{current=new Date(current.getFullYear(),current.getMonth()+1,1);render()};$('today').onclick=()=>{current=new Date();render()};$('monthBtn').onclick=()=>{$('monthWrap').style.display='block';$('list').style.display='none';$('monthBtn').classList.add('primary');$('listBtn').classList.remove('primary')};$('listBtn').onclick=()=>{$('monthWrap').style.display='none';$('list').style.display='block';$('monthBtn').classList.remove('primary');$('listBtn').classList.add('primary')};['search','teacherFilter','activityFilter','statusFilter'].forEach(id=>$(id).addEventListener(id==='search'?'input':'change',render));$('clearBtn').onclick=()=>{if(confirm('Clear all lessons?')){events=[];save();refreshActivities();render()}};$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify({teachers:TEACHERS,events},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='music-delight-calendar-backup.json';a.click();URL.revokeObjectURL(a.href)};setup();refreshActivities();render();
</script></body></html>
